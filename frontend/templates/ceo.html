{% extends "base.html" %}
{% block title %} · CEO Report{% endblock %}

{% block content %}
<div class="row-between mb20">
  <div>
    <div class="page-eyebrow">CEO DIGEST</div>
    <h2 class="page-title">Weekly Report → Germany 🇩🇪 <span class="page-badge page-badge--live">Live</span></h2>
    <p class="page-sub">Auto-generated from Kafka · ceo.report topic · Delivered via email</p>
  </div>
  <button id="send-btn" class="btn btn--cyan" onclick="sendReport()" style="padding:10px 22px;font-size:12px;font-weight:700">
    📧 Send to CEO
  </button>
</div>

<!-- Report card -->
<div class="panel panel--dark mb20" style="border-color:rgba(56,189,248,.2)" id="report-card">
  <div style="text-align:center;padding:32px;color:var(--muted)"><span class="loader"></span></div>
</div>

<!-- Schedule -->
<div class="panel" id="schedule-panel" style="display:none">
  <div class="section-title">
    <span class="section-title__icon">📅</span>
    <span class="section-title__text">Report Schedule</span>
    <div class="section-title__line"></div>
  </div>
  <div id="schedule-grid" class="g3"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SECTION_META = {
  business_summary: {title:"📊 Business Summary",  color:"var(--cyan)"},
  action_required:  {title:"⚠️ Action Required",   color:"var(--red)"},
  wins:             {title:"✅ This Week's Wins",   color:"var(--green)"},
  team_update:      {title:"👥 Team Update",        color:"var(--purple)"},
};

async function loadReport() {
  const r = await api('/api/v1/bundle/ceo');
  if (!r) return;

  const card = document.getElementById('report-card');
  card.innerHTML = `
    <div style="border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">
        FROM: ${r.from_addr} · TO: ${r.to_addr} · SUBJECT:
      </div>
      <div style="font-size:18px;font-weight:800;color:var(--text);margin-top:6px">${r.subject}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">
        Generated: ${new Date(r.generated).toLocaleString()} · Auto-dispatched via report-service:1.1
      </div>
    </div>

    <div class="g2" style="gap:20px;margin-bottom:20px">
      ${Object.entries(SECTION_META).map(([key, m]) => `
        <div>
          <div style="font-weight:700;color:${m.color};font-size:14px;margin-bottom:10px">${m.title}</div>
          ${r.sections[key].map(item => `
            <div style="font-size:12px;color:var(--text);padding:5px 0;
                        border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5">${item}</div>`).join('')}
        </div>`).join('')}
    </div>

    <div style="padding:14px 16px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.2);border-radius:8px">
      <div style="font-weight:700;color:var(--blue);font-size:13px;margin-bottom:8px">📈 Pipeline Health (CEO View)</div>
      <div class="g4" style="font-size:12px">
        ${Object.entries(r.pipeline_health).map(([label, val]) => `
          <div style="text-align:center">
            <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--cyan)">${val}</div>
            <div style="color:var(--muted);font-size:10px;margin-top:2px">${label.replace(/_/g,' ')}</div>
          </div>`).join('')}
      </div>
    </div>`;

  const schedPanel = document.getElementById('schedule-panel');
  schedPanel.style.display = 'block';
  const SCHED_COLORS = ['var(--cyan)','var(--purple)','var(--green)'];
  document.getElementById('schedule-grid').innerHTML = r.schedule.map((s,i) => `
    <div style="background:rgba(255,255,255,.02);border:1px solid ${SCHED_COLORS[i]}33;border-radius:10px;padding:14px 16px">
      <div style="font-family:var(--mono);font-weight:700;color:${SCHED_COLORS[i]};font-size:15px;margin-bottom:6px">${s.freq}</div>
      <div style="font-size:12px;color:var(--text);margin-bottom:4px">${s.time}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${s.content}</div>
      ${tag('AUTO-SEND')}
    </div>`).join('');
}

async function sendReport() {
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';
  btn.className = 'btn';
  const r = await apiPost('/api/ceo/send');
  if (r && r.sent) {
    btn.textContent = '✓ Sent to CEO';
    btn.className = 'btn btn--green';
  } else {
    btn.textContent = '✗ Failed';
    btn.disabled = false;
    btn.className = 'btn btn--cyan';
  }
}

loadReport();
</script>
{% endblock %}
