{% extends "base.html" %}
{% block title %} · Payments{% endblock %}
{% block content %}
<div class="page-header row-between" style="flex-wrap:wrap;gap:12px">
  <div>
    <h2 class="page-title">Payments <span class="page-badge page-badge--live">Live</span></h2>
    <p class="page-sub">Record payments · mark overdue as paid (ops login)</p>
  </div>
  <button class="btn btn--green ops-only" onclick="showInvoice()" style="display:none">+ Invoice</button>
</div>
<div class="g3 mb20" id="pay-summary"></div>
<div id="invoice-panel" class="panel panel--glass mb20" style="display:none;max-width:420px">
  <div class="section-title"><span class="section-title__text">New invoice</span></div>
  <select id="inv-school" class="search-input" style="width:100%;margin-bottom:8px"></select>
  <input id="inv-amount" type="number" class="search-input" placeholder="Amount PKR" style="width:100%;margin-bottom:8px" />
  <input id="inv-due" type="date" class="search-input" style="width:100%;margin-bottom:8px" />
  <button class="btn btn--green" onclick="createInvoice()">Create</button>
</div>
<div class="panel panel--glass"><table class="data-table"><thead><tr><th>School</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody id="pay-rows"></tbody></table></div>
{% endblock %}
{% block scripts %}
<script>
let payData = null;
function isOps() {
  try { return JSON.parse(localStorage.getItem('roboclub_user')||'{}').role === 'ops'; } catch(_) { return false; }
}
function showInvoice() {
  const p = document.getElementById('invoice-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}
async function createInvoice() {
  const body = {
    school_id: +document.getElementById('inv-school').value,
    amount_pkr: +document.getElementById('inv-amount').value,
    due_date: document.getElementById('inv-due').value,
    description: 'Invoice',
  };
  const r = await apiPost('/api/v1/payments', body);
  if (r) { RoboClub?.toast('Invoice created'); renderPayments(payData); document.getElementById('invoice-panel').style.display='none'; }
}
async function markPaid(id) {
  const r = await apiPut('/api/v1/payments/' + id + '/paid');
  if (r?.ok) { RoboClub?.toast('Marked paid'); api('/api/v1/bundle/payments').then(renderPayments); }
}
function renderPayments(d) {
  if (!d) return;
  payData = d;
  const s = d.summary;
  document.getElementById('pay-summary').innerHTML = `
    <div class="stat-card"><div class="stat-card__label">Overdue</div><div class="stat-card__val" style="color:var(--red)">${s.overdue_count}</div></div>
    <div class="stat-card"><div class="stat-card__label">Outstanding</div><div class="stat-card__val">${s.outstanding_display}</div></div>
    <div class="stat-card"><div class="stat-card__label">Records</div><div class="stat-card__val">${d.total}</div></div>`;
  const ops = isOps();
  document.querySelectorAll('.ops-only').forEach(el => el.style.display = ops ? '' : 'none');
  if (ops && d.schools) {
    document.getElementById('inv-school').innerHTML = d.schools.map(s =>
      `<option value="${s.id}">${s.name}</option>`).join('');
  }
  document.getElementById('pay-rows').innerHTML = d.items.map(p => `<tr>
    <td><a href="/school?id=${p.school_id}">${p.school_name}</a></td>
    <td>${p.amount_display}</td><td>${p.due_date}</td>
    <td><span class="tag tag--${p.status==='overdue'?'red':p.status==='paid'?'green':'yellow'}">${p.status}</span></td>
    <td>${ops && p.status !== 'paid' ? `<button class="btn btn--green" onclick="markPaid(${p.id})">Mark paid</button>` : '—'}</td></tr>`).join('');
}
api('/api/v1/bundle/payments').then(renderPayments);
</script>
{% endblock %}
