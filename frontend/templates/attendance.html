{% extends "base.html" %}
{% block title %} · Attendance{% endblock %}
{% block content %}
<div class="page-header"><h2 class="page-title">Attendance <span class="page-badge page-badge--live">Live</span></h2></div>
<div class="g2 mb20"><div class="stat-card"><div class="stat-card__label">Avg today</div><div class="stat-card__val" id="stat-avg">—</div></div>
<div class="stat-card"><div class="stat-card__label"><a href="/checkin">Trainer check-in →</a></div></div></div>
<div class="panel mb20"><div id="checkin-feed"></div></div>
<div class="panel"><div id="att-board"></div></div>
{% endblock %}
{% block scripts %}
<script>
function render(d) {
  document.getElementById('stat-avg').textContent = d.avg + '%';
  document.getElementById('att-board').innerHTML = d.schools.map(s => `
    <div style="padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px">
      <b>${s.name}</b> <span style="float:right;font-family:var(--mono)">${s.att}%</span>
      <div style="font-size:11px;color:var(--muted)">${s.present}/${s.total}</div></div>`).join('');
  document.getElementById('checkin-feed').innerHTML = d.sessions.slice(0,10).map(s => `
    <div style="font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)">
      ${s.school_name} · ${s.present}/${s.total} (${s.att}%) · ${s.session_date}</div>`).join('') || '<p style="color:var(--muted)">No sessions yet</p>';
}
api('/api/v1/bundle/attendance').then(d => d && render(d));
window.addEventListener('roboclub:tick', e => { if (e.detail?.schools) api('/api/v1/bundle/attendance').then(render); });
</script>
{% endblock %}
