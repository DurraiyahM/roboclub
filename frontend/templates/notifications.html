{% extends "base.html" %}
{% block title %} · Alerts{% endblock %}

{% block content %}
<div class="row-between mb20">
  <div>
    <div class="page-eyebrow">ALERTS &amp; NOTIFICATIONS</div>
    <h2 class="page-title">Notification Inbox <span id="page-source-badge" class="page-badge page-badge--live">Live</span></h2>
    <p class="page-sub">Filter · resolve · snooze · live rules from database</p>
  </div>
  <div class="row-center gap8">
    <select id="cat-filter" class="btn" onchange="loadNotifs()">
      <option value="">All categories</option>
      <option value="attendance">Attendance</option>
      <option value="inventory">Inventory</option>
      <option value="payment">Payment</option>
      <option value="general">General</option>
    </select>
    <button class="btn" onclick="markAll()">Mark all read</button>
  </div>
</div>

<div class="panel mb20">
  <div class="section-title">
    <span class="section-title__icon">⚙️</span>
    <span class="section-title__text">Alert Rules</span>
    <div class="section-title__line"></div>
  </div>
  <div id="rules-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px"></div>
</div>

<div class="panel">
  <div class="section-title">
    <span class="section-title__icon">🔔</span>
    <span class="section-title__text">Inbox</span>
    <div class="section-title__line"></div>
  </div>
  <div id="notif-list" style="display:grid;gap:8px">
    <div style="text-align:center;padding:24px;color:var(--muted)"><span class="loader"></span></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TYPE_STYLE = {
  error:   {color:"var(--red)",    icon:"🔴"},
  warn:    {color:"var(--yellow)", icon:"🟡"},
  success: {color:"var(--green)",  icon:"🟢"},
  info:    {color:"var(--cyan)",   icon:"🔵"},
};
let _notifications = [];

function renderNotifs() {
  const list = document.getElementById('notif-list');
  if (!_notifications.length) {
    list.innerHTML = '<p style="text-align:center;padding:32px;color:var(--muted)">No open alerts — you’re all caught up.</p>';
    return;
  }
  list.innerHTML = _notifications.map(n => {
    const ts = TYPE_STYLE[n.type] || TYPE_STYLE.info;
    return `
    <div style="display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:12px 16px;border-radius:10px;
      background:rgba(255,255,255,.02);border:1px solid ${n.read?'var(--border)':ts.color.replace(')',',0.3)')}">
      <span style="font-size:18px">${ts.icon}</span>
      <div>
        <div style="font-weight:700;font-size:13px">${n.title} ${tag(n.category || 'general')}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${n.body}</div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <button class="btn" onclick="event.stopPropagation();resolveN(${n.id})">Resolve</button>
          <button class="btn" onclick="event.stopPropagation();snoozeN(${n.id})">Snooze 24h</button>
          <button class="btn" onclick="event.stopPropagation();markRead(${n.id})">Read</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--dim)">${n.time}</div>
    </div>`;
  }).join('');
}

async function loadRules() {
  const rules = await api('/api/v1/alert-rules');
  if (!rules) return;
  document.getElementById('rules-grid').innerHTML = rules.map(r => `
    <div style="background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
      <div style="font-size:12px;font-weight:600;margin-bottom:6px">${r.label}</div>
      <div class="row-between">
        <span class="tag">${r.channels}</span>
        <label style="font-size:11px;color:var(--muted)">
          <input type="checkbox" ${r.enabled?'checked':''} onchange="toggleRule('${r.rule_key}', this.checked)" /> On
        </label>
      </div>
    </div>`).join('');
}

async function loadNotifs() {
  const cat = document.getElementById('cat-filter').value;
  const path = cat ? `/api/notifications?category=${cat}` : '/api/notifications';
  const data = await api(path);
  if (!data) return;
  _notifications = data.filter(n => !n.resolved);
  renderNotifs();
}

async function markRead(id) { await apiPut(`/api/notifications/${id}/read`); loadNotifs(); refreshBadge(); }
async function markAll() { await apiPut('/api/notifications/all/read'); loadNotifs(); refreshBadge(); }
async function resolveN(id) { await apiPut(`/api/notifications/${id}/resolve`); loadNotifs(); refreshBadge(); }
async function snoozeN(id) { await apiPut(`/api/notifications/${id}/snooze?hours=24`); loadNotifs(); refreshBadge(); }
async function toggleRule(key, on) {
  const token = localStorage.getItem('roboclub_token');
  if (!token) { alert('Login as ops to change rules'); return; }
  await fetch(API + `/api/v1/alert-rules/${key}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ enabled: on }),
  });
}

function onLiveNotification(d) {
  if (!d.notification) return;
  loadNotifs();
  if (typeof d.count === 'number') setBadgeCount(d.count);
  showToast(d.notification);
}

loadRules();
loadNotifs();
if (USE_POLLING) {
  window.addEventListener('roboclub:tick', ev => {
    if (ev.detail?.notification) onLiveNotification({ notification: ev.detail.notification, count: ev.detail.count });
  });
} else {
  const notifEs = new EventSource(API + '/api/notifications/stream');
  notifEs.onmessage = ev => { const d = JSON.parse(ev.data); if (d.event === 'notification') onLiveNotification(d); };
}

function showToast(n) {
  const ts = TYPE_STYLE[n.type] || TYPE_STYLE.info;
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:20px;right:24px;z-index:100;padding:14px 18px;border-radius:10px;
    background:#060f1e;border:1px solid ${ts.color};max-width:320px`;
  el.innerHTML = `<div style="font-weight:700;font-size:13px">${ts.icon} ${n.title}</div><div style="font-size:12px;color:var(--muted)">${n.body}</div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}
</script>
{% endblock %}
