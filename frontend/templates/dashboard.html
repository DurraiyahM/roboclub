{% extends "base.html" %}
{% block title %} · Dashboard{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-eyebrow">LIVE DASHBOARD</div>
  <h2 class="page-title">Co-Founder Operations <span id="page-source-badge" class="page-badge page-badge--live">Live</span></h2>
</div>
<div class="g3 mb20" id="ops-priority"></div>
<div id="kpi-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px"></div>
<div class="panel"><div id="school-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px"></div></div>
{% endblock %}
{% block scripts %}
<script>
const KPI_META = {
  active_schools:{l:"Active Schools",c:"var(--cyan)",i:"🏫"},
  students_live:{l:"Students",c:"var(--purple)",i:"🧒"},
  trainers_online:{l:"Trainers",c:"var(--green)",i:"👨‍🏫"},
  revenue_apr:{l:"Revenue (Apr)",c:"var(--green)",i:"💰"},
  inventory_alerts:{l:"Inventory Alerts",c:"var(--yellow)",i:"📦"},
  pending_mous:{l:"Pending MOUs",c:"var(--red)",i:"📄"},
  outstanding_pkr:{l:"Outstanding",c:"var(--yellow)",i:"⏳"},
  new_leads:{l:"New Leads",c:"var(--cyan)",i:"📣"},
};
function renderHome(d) {
  document.getElementById('ops-priority').innerHTML = `
    <div class="stat-card" style="border-left:3px solid var(--cyan)"><div class="stat-card__label">Attendance avg</div>
      <div class="stat-card__val" style="color:var(--cyan)">${d.ops.attendance_avg}%</div></div>
    <div class="stat-card" style="border-left:3px solid var(--red)"><div class="stat-card__label">Overdue</div>
      <div class="stat-card__val" style="color:var(--red)">${d.ops.overdue_total_display}</div></div>
    <div class="stat-card" style="border-left:3px solid var(--yellow)"><div class="stat-card__label">Stock alerts</div>
      <div class="stat-card__val" style="color:var(--yellow)">${d.ops.inventory_alerts}</div></div>`;
  document.getElementById('kpi-grid').innerHTML = Object.entries(KPI_META).map(([k,m]) => `
    <div class="panel" style="border-left:3px solid ${m.c}"><div>${m.i}</div>
      <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${m.c}">${d.kpis[k]}</div>
      <div style="font-size:12px;color:var(--muted)">${m.l}</div></div>`).join('');
  renderSchools(d.schools);
  if (d.critical) renderCritical(d.critical);
  setBadgeCount(d.unread_count);
}
function renderSchools(schools) {
  const SC = {green:"var(--green)",yellow:"var(--yellow)",cyan:"var(--cyan)",muted:"var(--muted)"};
  document.getElementById('school-grid').innerHTML = (schools||[]).map(s => `
    <a href="/school?id=${s.id}" style="text-decoration:none;color:inherit">
    <div style="padding:12px;border:1px solid ${SC[s.status]||'var(--border)'}33;border-radius:10px">
      <div style="font-weight:700">${s.name}</div>
      <div style="font-size:11px;color:var(--muted)">${s.city} · ${s.att}% · ${s.present}/${s.total}</div>
    </div></a>`).join('') || '<p style="color:var(--muted)">No schools</p>';
}
api('/api/v1/bundle/home').then(d => d && renderHome(d));
window.addEventListener('roboclub:tick', e => { if (e.detail?.schools) renderSchools(e.detail.schools); });
</script>
{% endblock %}
