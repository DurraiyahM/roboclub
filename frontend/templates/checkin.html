{% extends "base.html" %}
{% block title %} · Check-in{% endblock %}
{% block content %}
<div class="page-header"><h2 class="page-title">Check-in <span class="page-badge page-badge--live">Live</span></h2></div>
<div class="panel" style="max-width:480px">
  <select id="school-id" class="search-input" style="width:100%;margin-bottom:10px"></select>
  <input id="present" type="number" class="search-input" style="width:100%;margin-bottom:10px" value="30" />
  <input id="total" type="number" class="search-input" style="width:100%;margin-bottom:10px" value="40" />
  <button class="btn btn--green" style="width:100%;padding:14px" onclick="submit()">Submit</button>
  <p id="msg" style="margin-top:12px;color:var(--green);font-size:12px"></p>
</div>
{% endblock %}
{% block scripts %}
<script>
api('/api/v1/bundle/checkin').then(d => {
  if (!d) return;
  document.getElementById('school-id').innerHTML = d.schools.filter(s=>s.total>0).map(s=>
    `<option value="${s.id}">${s.name}</option>`).join('');
});
async function submit() {
  const t = localStorage.getItem('roboclub_token');
  if (!t) { location.href='/login'; return; }
  const r = await fetch(API+'/api/v1/attendance/sessions', {
    method:'POST',
    headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},
    body: JSON.stringify({
      school_id: +document.getElementById('school-id').value,
      present: +document.getElementById('present').value,
      total: +document.getElementById('total').value,
    }),
  });
  const msg = document.getElementById('msg');
  if (r.ok) {
    const d = await r.json();
    msg.textContent = `Saved ${d.session.att}% (${d.session.present}/${d.session.total})`;
  } else msg.textContent = 'Failed — login as trainer@roboclub.pk';
}
</script>
{% endblock %}
