version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roboclub-api
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
    volumes:
      - roboclub-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Flask frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roboclub-web
    ports:
      - "5000:5000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  roboclub-data:
